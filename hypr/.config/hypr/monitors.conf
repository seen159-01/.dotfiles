# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,1.5

# monitor = DP-2, 5120x2160@165, 0x0, 1.25, bitdepth, 10, cm, hdr, sdrbrightness, 1.15,
monitor = DP-1, 5120x2160@165, 0x0, 1.25, bitdepth, 10, cm, srgb,
monitor = DP-2, 1920x1080@60, auto-left, 1, transform, 1, cm, srgb,

supports_wide_color = 1
supports_hdr = 1
#   workspace = r[3], m[$mainMonitor]
# # workspace = r[1-2], rounding:false, monitors:DP-3
# workspace = r[3-5], rounding:true, monitors:DP-2 
# workspace = r[1], m[$secondaryMonitor]

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
