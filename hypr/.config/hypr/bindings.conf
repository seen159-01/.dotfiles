# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER , E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
# bindd = SUPER,LA, launch apps, exec, omarchy-launch-walker

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://claude.ai"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHLFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE

## My custom changes
# Changed browser to open on SUPER SHIFT W(eb browser)
bindd = SUPER SHIFT, W, Browser, exec, $browser
bindd = SUPER SHIFT ALT, W, Browser (private), exec, $browser --private

# Unbind SUPER J & K from toggle splitscreen, show key bindings, and map SUPER S to toggle splitscreen
unbind = SUPER, H
unbind = SUPER, L
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, W
unbind = SUPER, G
unbind = CTRL SUPER, L
unbind = CTRL ALT, H
# unbind = SUPER, Space


# Bind move focus keys and move window keys to use vim motions
# bindd = SUPER, M, Toggle Dwindle, dwindle
bindd = SUPER , W, Toggle split, togglesplit # dwindle
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, L, Move focus right, movefocus, r
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, J, Move focus down, movefocus, d

# Bind SUPER Q to close(quit) windows, SUPER B to show key bindings, and unbind SUPER W so I don't accidently close a window when trying to open the browser.
bindd = SUPER, Q, Close active window, killactive,
bindd = SUPER, B, Show key bindings, exec, omarchy-menu-keybindings

# Swap active window with the one next to it with SUPER + SHIFT + vim motions
bindd = SUPER ALT, H, Swap window to the left, movewindow, l
bindd = SUPER ALT, L, Swap window to the right, movewindow, r
bindd = SUPER ALT, K, Swap window up, movewindow, u
bindd = SUPER ALT, J, Swap window down, movewindow, d
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

bindde = SUPER SHIFT, H, Increase Left, resizeactive, -30 0
bindde = SUPER SHIFT, J, Increase Up, resizeactive, 0 30
bindde = SUPER SHIFT, K, Increase Left, resizeactive, 0 -30
bindde = SUPER SHIFT, L, Increase Right, resizeactive, 30 0
bindde = CTRL SUPER, h, move to left workspace, workspace, -1
bindde = CTRL SUPER, l, move to right workspace, workspace, +1

bindd = SUPER SHIFT, S, snipping tool, exec, omarchy-cmd-screenshot smart clipboard


bindp = CONTROL, J, sendshortcut, ,Down, 
bindp = CONTROL, k, sendshortcut, ,Up, 

 # bindd = CONTROL SUPER ALT , L, LOCK, exec, omarchy-lock-screen
